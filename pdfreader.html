<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Export PDF Raw to TXT</title>
    <style>
        body { font-family: sans-serif; padding: 30px; line-height: 1.5; }
        .box { border: 1px solid #ccc; padding: 20px; border-radius: 8px; max-width: 500px; }
        button { background: #28a745; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; }
        button:disabled { background: #94d3a2; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="box">
    <h3>PDF Raw Data to TXT</h3>
    <input type="file" id="pdfInput" accept="application/pdf">
    <br><br>
    <button id="btnExport" disabled>Export ke RAW_DATA.txt</button>
    <p id="status"></p>
</div>

<script>
    let rawBuffer = null;
    let originalName = "";

    const pdfInput = document.getElementById('pdfInput');
    const btnExport = document.getElementById('btnExport');
    const status = document.getElementById('status');

    pdfInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        originalName = file.name;
        rawBuffer = await file.arrayBuffer(); // Ambil ArrayBuffer
        
        btnExport.disabled = false;
        status.innerText = "File siap diekspor.";
    };

    btnExport.onclick = () => {
        if (!rawBuffer) return;

        // 1. Ubah ArrayBuffer menjadi Base64 string agar aman di dalam .txt
        const uint8 = new Uint8Array(rawBuffer);
        let binary = '';
        for (let i = 0; i < uint8.byteLength; i++) {
            binary += String.fromCharCode(uint8[i]);
        }
        const base64Data = btoa(binary);

        // 2. Buat Blob teks
        const textContent = `FILE_NAME: ${originalName}\n` +
                           `RAW_BASE64_DATA:\n${base64Data}`;
        
        const blob = new Blob([textContent], { type: 'text/plain' });
        
        // 3. Proses Download
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = originalName.replace(".pdf", "_raw.txt");
        link.click();
        
        status.innerText = "Berhasil! Cek folder download Anda.";
    };
</script>

</body>
</html>

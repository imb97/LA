<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Data Extractor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div class="max-w-4xl mx-auto px-4 py-10">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold text-slate-800">PDF Text Extractor</h1>
            <p class="text-slate-500 mt-2">Ubah dokumen PDF menjadi teks mentah secara instan & aman.</p>
        </div>

        <div class="bg-white shadow-xl rounded-2xl p-6 md:p-8">
            
            <div id="dropZone" class="relative border-2 border-dashed border-slate-300 rounded-xl p-8 text-center hover:border-blue-500 hover:bg-blue-50 transition-all cursor-pointer group">
                <input type="file" id="pdfInput" accept="application/pdf" class="hidden">
                <div class="flex flex-col items-center">
                    <svg class="w-12 h-12 text-slate-400 group-hover:text-blue-500 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                    <p class="text-slate-600 font-medium" id="fileNameDisplay">Klik atau seret file PDF ke sini</p>
                    <p class="text-slate-400 text-sm mt-1">Maksimal file PDF digital (bukan scan)</p>
                </div>
            </div>

            <div id="loading" class="hidden mt-6 text-center">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-500 border-t-transparent"></div>
                <p class="text-blue-600 font-medium mt-2">Sedang memproses teks...</p>
            </div>

            <div id="actions" class="hidden mt-8 flex flex-wrap gap-3 justify-between items-center border-t pt-6">
                <div class="flex gap-2">
                    <button id="btnCopy" class="bg-slate-800 hover:bg-slate-900 text-white px-5 py-2 rounded-lg text-sm font-semibold transition flex items-center gap-2">
                        <span>Copy Teks</span>
                    </button>
                    <button id="btnDownload" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg text-sm font-semibold transition">
                        Simpan ke JSON
                    </button>
                </div>
                <span id="pageCount" class="text-slate-500 text-sm italic"></span>
            </div>

            <div id="resultWrapper" class="hidden mt-6">
                <label class="block text-sm font-semibold text-slate-700 mb-2">Hasil Ekstraksi:</label>
                <div id="output" class="w-full h-96 bg-slate-50 border border-slate-200 rounded-xl p-4 text-slate-700 text-sm overflow-y-auto whitespace-pre-wrap custom-scrollbar border-l-4 border-l-blue-500">
                    Isi teks akan muncul di sini...
                </div>
            </div>
        </div>

        <p class="text-center text-slate-400 text-xs mt-8">© 2026 PDF Parser Static Tool - Privacy Guaranteed (Local Processing)</p>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const pdfInput = document.getElementById('pdfInput');
        const dropZone = document.getElementById('dropZone');
        const output = document.getElementById('output');
        const loading = document.getElementById('loading');
        const actions = document.getElementById('actions');
        const resultWrapper = document.getElementById('resultWrapper');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const pageCount = document.getElementById('pageCount');

        let extractedText = "";

        // UI Interactions
        dropZone.onclick = () => pdfInput.click();
        
        pdfInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            processPDF(file);
        };

        // Drag and Drop Logic
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('bg-blue-50', 'border-blue-500'); };
        dropZone.ondragleave = () => { dropZone.classList.remove('bg-blue-50', 'border-blue-500'); };
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('bg-blue-50', 'border-blue-500');
            const file = e.dataTransfer.files[0];
            if (file && file.type === "application/pdf") processPDF(file);
        };

        async function processPDF(file) {
            fileNameDisplay.innerText = file.name;
            loading.classList.remove('hidden');
            resultWrapper.classList.add('hidden');
            actions.classList.add('hidden');

            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                try {
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    let fullText = "";

                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        const pageText = textContent.items.map(item => item.str).join(" ");
                        fullText += `[Halaman ${i}]\n${pageText}\n\n`;
                    }

                    extractedText = fullText;
                    output.innerText = fullText;
                    pageCount.innerText = `${pdf.numPages} Halaman terdeteksi`;
                    
                    loading.classList.add('hidden');
                    resultWrapper.classList.remove('hidden');
                    actions.classList.remove('hidden');
                } catch (err) {
                    alert("Gagal membaca PDF. File mungkin rusak atau terenkripsi.");
                    loading.classList.add('hidden');
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // Action: Copy
        document.getElementById('btnCopy').onclick = () => {
            navigator.clipboard.writeText(extractedText);
            const btn = document.getElementById('btnCopy');
            const originalText = btn.innerHTML;
            btn.innerHTML = "Berhasil Disalin!";
            btn.classList.replace('bg-slate-800', 'bg-green-600');
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.classList.replace('bg-green-600', 'bg-slate-800');
            }, 2000);
        };

        // Action: Download JSON
        document.getElementById('btnDownload').onclick = () => {
            const data = { fileName: pdfInput.files[0]?.name || "document", content: extractedText };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = data.fileName.replace(".pdf", "_raw.json");
            a.click();
        };
    </script>
</body>
</html>

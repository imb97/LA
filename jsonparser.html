<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>JSON Parser Responsive</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; }
        .container { max-width: 100%; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; }
        textarea { width: 100%; height: 100px; box-sizing: border-box; margin-bottom: 10px; }
        
        /* SOLUSI AGAR TIDAK KELUAR CONTAINER */
        .table-wrapper { 
            width: 100%; 
            overflow-x: auto; 
            margin-top: 20px; 
            border: 1px solid #eee;
        }

        table { width: 100%; border-collapse: collapse; white-space: nowrap; } /* white-space: nowrap agar teks tidak ganti baris paksa */
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #333; color: white; position: sticky; top: 0; }
        
        .controls { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
        input[type="text"] { padding: 8px; flex-grow: 1; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h2>JSON Parser (Responsive Table)</h2>
    <textarea id="jsonInput" placeholder="Paste JSON..."></textarea>
    
    <div class="controls">
        <button onclick="processJSON()">Konversi</button>
        <input type="text" id="filterInput" placeholder="Cari data..." onkeyup="applyFilter()">
        <button onclick="exportToExcel()" style="background: green; color: white;">Excel</button>
    </div>

    <div class="table-wrapper">
        <div id="tableContainer"></div>
    </div>
</div>

<script>
    let currentData = [];
    function processJSON() {
        try {
            currentData = JSON.parse(document.getElementById('jsonInput').value);
            renderTable(currentData);
        } catch (e) { alert("Format JSON Salah!"); }
    }

    function renderTable(data) {
        if (data.length === 0) return;
        const headers = Object.keys(currentData[0]);
        let html = `<table><thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead><tbody>`;
        data.forEach(item => {
            html += `<tr>${headers.map(h => `<td>${item[h] ?? ""}</td>`).join('')}</tr>`;
        });
        document.getElementById('tableContainer').innerHTML = html + `</tbody></table>`;
    }

    function applyFilter() {
        const key = document.getElementById('filterInput').value.toLowerCase();
        const filtered = currentData.filter(row => 
            Object.values(row).some(v => String(v).toLowerCase().includes(key))
        );
        renderTable(filtered);
    }

    function exportToExcel() {
        const ws = XLSX.utils.json_to_sheet(currentData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Data");
        XLSX.writeFile(wb, "Data_Export.xlsx");
    }
</script>
</body>
</html>

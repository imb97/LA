<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>JSON Parser: Filter, Sort & Summary</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        textarea { width: 100%; height: 100px; margin-bottom: 10px; padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-family: monospace; box-sizing: border-box; }
        
        .controls { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; background: #fff; padding: 10px 0; position: sticky; top: 0; z-index: 10; }
        .search-box { flex-grow: 1; min-width: 250px; padding: 10px; border: 2px solid #007bff; border-radius: 6px; outline: none; }
        
        button { padding: 10px 18px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: 0.2s; }
        .btn-parse { background: #007bff; color: white; }
        .btn-export { background: #1d6f42; color: white; }
        select { padding: 10px; border-radius: 6px; border: 1px solid #ccc; }

        .summary-section { display: none; margin-bottom: 20px; padding: 15px; background: #e9ecef; border-radius: 8px; border-left: 5px solid #007bff; }
        .summary-table { background: white; border-collapse: collapse; margin-top: 10px; }
        .summary-table td, .summary-table th { border: 1px solid #ddd; padding: 8px 15px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #343a40; color: white; cursor: pointer; padding: 12px; text-align: left; position: sticky; top: 60px; }
        td { border: 1px solid #ddd; padding: 10px; }
        tr:nth-child(even) { background: #f9f9f9; }
        tr:hover { background: #f1f1f1; }
        .no-data { text-align: center; padding: 20px; color: #999; }
    </style>
</head>
<body>

<div class="container">
    <h2>JSON Parser Advanced Filter</h2>
    
    <textarea id="jsonInput" placeholder="Tempel JSON di sini...">
[
  { "kota": "Jakarta", "ticket_id": 6758, "status": "Closed" },
  { "kota": "Surabaya", "ticket_id": 6760, "status": "Open" },
  { "kota": "Jakarta", "ticket_id": 6765, "status": "Open" },
  { "kota": "Bandung", "ticket_id": 6770, "status": "Closed" },
  { "kota": "Medan", "ticket_id": 6780, "status": "Pending" }
]</textarea>

    <div class="controls">
        <button class="btn-parse" onclick="processJSON()">1. Konversi Data</button>
        
        <input type="text" id="filterInput" class="search-box" placeholder="Cari data (ketik di sini...)" onkeyup="applyFilter()">

        <span>Ringkasan:</span>
        <select id="columnSelect" onchange="generateSummary()">
            <option value="">-- Pilih Kolom --</option>
        </select>

        <button class="btn-export" onclick="exportToExcel()">Download (.xlsx)</button>
    </div>

    <div id="summarySection" class="summary-section">
        <strong>Ringkasan per Kolom:</strong>
        <div id="summaryResult"></div>
    </div>

    <div id="tableContainer"></div>
</div>

<script>
    let currentData = [];
    let filteredData = [];

    function processJSON() {
        const input = document.getElementById('jsonInput').value;
        try {
            currentData = JSON.parse(input);
            filteredData = [...currentData]; // Salin data asli ke data yang difilter
            updateDropdown(currentData);
            renderTable(filteredData);
            document.getElementById('summarySection').style.display = 'none';
            document.getElementById('filterInput').value = ""; // Reset filter
        } catch (e) {
            alert("JSON tidak valid: " + e.message);
        }
    }

    // Fungsi Filter Data
    function applyFilter() {
        const keyword = document.getElementById('filterInput').value.toLowerCase();
        
        filteredData = currentData.filter(item => {
            // Cek apakah ada salah satu nilai di baris tersebut yang cocok dengan keyword
            return Object.values(item).some(val => 
                String(val).toLowerCase().includes(keyword)
            );
        });

        renderTable(filteredData);
        // Update summary jika kolom sudah terpilih
        if (document.getElementById('columnSelect').value) {
            generateSummary();
        }
    }

    function renderTable(data) {
        const container = document.getElementById('tableContainer');
        if (data.length === 0) {
            container.innerHTML = "<div class='no-data'>Tidak ada data yang cocok dengan pencarian.</div>";
            return;
        }

        const headers = Object.keys(currentData[0]);
        let html = `<table><thead><tr>`;
        headers.forEach(h => html += `<th>${h}</th>`);
        html += `</tr></thead><tbody>`;

        data.forEach(item => {
            html += `<tr>`;
            headers.forEach(h => html += `<td>${item[h] ?? ""}</td>`);
            html += `</tr>`;
        });

        container.innerHTML = html + `</tbody></table>`;
    }

    function updateDropdown(data) {
        const select = document.getElementById('columnSelect');
        const headers = Object.keys(data[0]);
        select.innerHTML = '<option value="">-- Pilih Kolom --</option>';
        headers.forEach(h => {
            let opt = document.createElement('option');
            opt.value = h;
            opt.innerHTML = h.toUpperCase();
            select.appendChild(opt);
        });
    }

    function generateSummary() {
        const col = document.getElementById('columnSelect').value;
        const summarySection = document.getElementById('summarySection');
        const summaryResult = document.getElementById('summaryResult');

        if (!col) {
            summarySection.style.display = 'none';
            return;
        }

        const counts = {};
        // Gunakan filteredData agar summary ikut berubah saat difilter
        filteredData.forEach(item => {
            let val = item[col] || "(Kosong)";
            counts[val] = (counts[val] || 0) + 1;
        });

        summarySection.style.display = 'block';
        let html = `<table class="summary-table"><thead><tr><th>${col}</th><th>Jumlah</th></tr></thead><tbody>`;
        for (let [key, val] of Object.entries(counts)) {
            html += `<tr><td>${key}</td><td>${val}</td></tr>`;
        }
        summaryResult.innerHTML = html + `</tbody></table>`;
    }

    function exportToExcel() {
        // Export data yang tampil (yang sudah difilter)
        const dataToExport = filteredData.length > 0 ? filteredData : currentData;
        const worksheet = XLSX.utils.json_to_sheet(dataToExport);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Data Terfilter");
        XLSX.writeFile(workbook, "Data_Export_Filtered.xlsx");
    }
</script>

</body>
</html>

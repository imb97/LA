<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>JSON Parser: Group By Summary</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background-color: #f4f7f6; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-family: monospace; }
        
        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: 0.2s; }
        .btn-parse { background: #007bff; color: white; }
        .btn-export { background: #1d6f42; color: white; }
        select { padding: 9px; border-radius: 6px; border: 1px solid #ccc; }

        /* Section Summary */
        .summary-section { display: none; margin-bottom: 25px; padding: 15px; background: #e9ecef; border-radius: 8px; }
        .summary-table { width: auto; min-width: 300px; background: white; margin-top: 10px; font-size: 14px; }
        .summary-table th { background: #6c757d; color: white; }

        /* Table Main */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #343a40; color: white; cursor: pointer; padding: 12px; text-align: left; }
        td { border: 1px solid #ddd; padding: 10px; }
        tr:nth-child(even) { background: #f9f9f9; }
    </style>
</head>
<body>

<div class="container">
    <h2>JSON Parser & Column Summary</h2>
    
    <textarea id="jsonInput" placeholder="Paste JSON di sini...">
[
  { "kota": "Jakarta", "ticket_id": 6758, "status": "Closed" },
  { "kota": "Surabaya", "ticket_id": 6760, "status": "Open" },
  { "kota": "Jakarta", "ticket_id": 6765, "status": "Open" },
  { "kota": "Bandung", "ticket_id": 6770, "status": "Closed" },
  { "kota": "Jakarta", "ticket_id": 6775, "status": "Open" }
]</textarea>

    <div class="controls">
        <button class="btn-parse" onclick="processJSON()">Konversi Data</button>
        
        <span>Summary Berdasarkan:</span>
        <select id="columnSelect" onchange="generateSummary()">
            <option value="">-- Pilih Kolom --</option>
        </select>

        <button class="btn-export" onclick="exportToExcel()">Download Excel (.xlsx)</button>
    </div>

    <div id="summarySection" class="summary-section">
        <strong>Ringkasan Data:</strong>
        <div id="summaryResult"></div>
    </div>

    <div class="table-wrapper" id="tableContainer"></div>
</div>

<script>
    let currentData = [];

    function processJSON() {
        const input = document.getElementById('jsonInput').value;
        try {
            currentData = JSON.parse(input);
            updateDropdown(currentData);
            renderTable(currentData);
            document.getElementById('summarySection').style.display = 'none';
        } catch (e) {
            alert("JSON tidak valid: " + e.message);
        }
    }

    // Mengisi pilihan kolom di dropdown secara otomatis
    function updateDropdown(data) {
        const select = document.getElementById('columnSelect');
        const firstItem = data[0];
        const headers = Object.keys(firstItem);
        
        select.innerHTML = '<option value="">-- Pilih Kolom --</option>';
        headers.forEach(h => {
            let opt = document.createElement('option');
            opt.value = h;
            opt.innerHTML = h.toUpperCase();
            select.appendChild(opt);
        });
    }

    // Fungsi Utama Summary (Group By)
    function generateSummary() {
        const col = document.getElementById('columnSelect').value;
        const summarySection = document.getElementById('summarySection');
        const summaryResult = document.getElementById('summaryResult');

        if (!col || currentData.length === 0) {
            summarySection.style.display = 'none';
            return;
        }

        // Hitung frekuensi (Count)
        const counts = {};
        currentData.forEach(item => {
            let val = item[col] || "(Kosong)";
            counts[val] = (counts[val] || 0) + 1;
        });

        summarySection.style.display = 'block';
        
        // Buat tabel summary kecil
        let html = `<table class="summary-table">
            <thead>
                <tr>
                    <th>${col.toUpperCase()}</th>
                    <th>JUMLAH (COUNT)</th>
                </tr>
            </thead>
            <tbody>`;
        
        for (let [key, val] of Object.entries(counts)) {
            html += `<tr><td>${key}</td><td>${val}</td></tr>`;
        }
        
        html += `</tbody></table>`;
        summaryResult.innerHTML = html;
    }

    function renderTable(data) {
        if (data.length === 0) return;
        const headers = Object.keys(data[0]);
        let html = `<table><thead><tr>`;
        headers.forEach(h => html += `<th>${h}</th>`);
        html += `</tr></thead><tbody>`;
        data.forEach(item => {
            html += `<tr>`;
            headers.forEach(h => html += `<td>${item[h] ?? ""}</td>`);
            html += `</tr>`;
        });
        document.getElementById('tableContainer').innerHTML = html + `</tbody></table>`;
    }

    function exportToExcel() {
        if (currentData.length === 0) return;
        const worksheet = XLSX.utils.json_to_sheet(currentData);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Data");
        XLSX.writeFile(workbook, "Data_Summary_Kota.xlsx");
    }
</script>

</body>
</html>
